<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

		<!-- <script src="./utils.js"></script> -->

		<title>Document</title>
	</head>
	<body>
		<div
			class="border mt-2 ms-5 w-75 d-flex flex-row justify-content-center"
		>
			<h1 class="">FORMULÁRIO DE DOAÇÃO</h1>
		</div>

		<div class="border ms-5 mt-2 mb-3 p-3 w-75">
			<!-- <form action="http://localhost:3000/api/doacao" method="post" target="_self"> -->
			<form id="meuFormulario">
				<div class="d-flex flex-row">
					<!-- nome -->
					<div class="flex-grow-1">
						<label for="nome" class="form-label">Nome:</label>
						<input
							type="text"
							class="form-control"
							id="nome"
							placeholder="Digite seu nome completo"
							name="nome"
						/>
					</div>
					<!-- cpf -->
					<div class="ms-3" style="width: 160px">
						<label for="CPF" class="form-label">CPF/CNPJ:</label>
						<input
							type="text"
							class="form-control"
							id="CPF"
							placeholder="Digite CPF ou CNPJ"
							name="CPF"
						/>
					</div>
				</div>

				<div class="d-flex flex-row">
					<!-- logradouro -->
					<div class="mt-3 flex-grow-1">
						<label for="logradouro" class="form-label"
							>Logradouro:</label
						>
						<input
							type="text"
							class="form-control"
							id="logradouro"
							placeholder="Digite seu endereço"
							name="logradouro"
						/>
					</div>
					<!-- numero -->
					<div class="mt-3 ms-3" style="width: 160px">
						<label for="numero" class="form-label">Número:</label>
						<input
							type="number"
							class="form-control"
							id="numero"
							placeholder="Digite o número"
							name="numero"
						/>
					</div>
					<!-- complemento -->
					<div class="mt-3 ms-3" style="width: 160px">
						<label for="complemento" class="form-label"
							>complemento:</label
						>
						<input
							type="text"
							class="form-control"
							id="complemento"
							placeholder="Digite o complemento"
							name="complemento"
						/>
					</div>
				</div>

				<div class="d-flex flex-row">
					<!-- cidade -->
					<div class="mt-3 flex-grow-1">
						<label for="cidade" class="form-label">Cidade:</label>
						<input
							type="text"
							class="form-control"
							id="cidade"
							placeholder="Digite sua cidade"
							name="cidade"
						/>
					</div>
					<!-- UF -->
					<div class="mt-3 ms-3">
						<label for="UF" class="form-label">UF:</label>
						<input
							type="text"
							class="form-control"
							id="UF"
							placeholder="Digite sua UF"
							name="UF"
							style="width: 120px"
						/>
					</div>
				</div>

				<div class="d-flex flex-row">
					<!-- email -->
					<div class="mt-3 flex-fill">
						<label for="email" class="form-label">Email:</label>
						<input
							type="email"
							class="form-control"
							id="email"
							placeholder="Digite seu email completo"
							name="email"
						/>
					</div>
					<!-- senha -->
					<div class="mt-3 ms-3 flex-fill">
						<label for="senha" class="form-label">Senha:</label>
						<input
							type="password"
							class="form-control"
							id="senha"
							placeholder="Digite sua senha"
							name="senha"
						/>
					</div>
				</div>

				<label class="mt-3">Valor da doação:</label>
				<div
					class="mt-2 border rounded-3 d-flex justify-content-between align-content-center"
					style="height: 40px"
				>
					<input
						type="radio"
						id="30"
						name="valor_doacao"
						value="30"
						class="form-check-input"
						checked
					/>
					<label for="30" class="flex-fill">R$ 30,00</label>
					<input
						type="radio"
						id="60"
						name="valor_doacao"
						value="60"
						class="form-check-input"
					/>
					<label for="60" class="flex-fill">R$ 60,00</label>
					<input
						type="radio"
						id="90"
						name="valor_doacao"
						value="90"
						class="form-check-input"
					/>
					<label for="90" class="flex-fill">R$ 90,00</label>
					<input
						type="radio"
						id="150"
						name="valor_doacao"
						value="150"
						class="form-check-input"
					/>
					<label for="150" class="flex-fill">R$ 150,00</label>
				</div>

				<div class="mt-3 w-100">
					<input type="submit" value="CLIQUE AQUI PARA CADASTRAR SUA DOAÇÃO"
						class="w-100 btn btn-success">
					</input>

					<!-- <button class="w-100 btn btn-success">
						CLIQUE AQUI PARA CADASTRAR SUA DOAÇÃO
					</button> -->
				</div>
			</form>
		</div>

		<script src="utils.js"></script>
	</body>
</html>
